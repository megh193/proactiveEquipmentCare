<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Integrated Analytics - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <img src="1.png" alt="Cloud Background" class="bg-image">

    <div class="screen">
        <div class="screen__background">
            <span class="screen__background__shape shape1"></span>
            <span class="screen__background__shape shape2"></span>
        </div>

        <div class="screen__content" id="loginContent">
            <form class="login" id="loginForm">
                <div class="he">Cloud Integrated Analytics</div>
                <div class="sub-he">Proactive Equipment Care using Analytics with Cloud</div>

                <div class="login__field">
                    <i class="login__icon fas fa-user"></i>
                    <input type="text" class="login__input" id="email" name="email" placeholder="Email (any)">
                    <span class="error-message" id="emailError">Email is required</span>
                </div>

                <div class="login__field">
                    <i class="login__icon fas fa-lock"></i>
                    <input type="password" class="login__input" id="password" name="password" placeholder="Password (any)">
                    <span class="error-message" id="passwordError">Password is required</span>
                </div>

                <div class="login__footer">
                    <button class="login__submit" type="submit" id="submitBtn">
                        <span class="button__text">Login</span>
                        <i class="button__icon fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otpModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeOtpModal">&times;</span>
            <h2>Enter Verification Code</h2>
            <p>A verification code has been sent to your email.</p>
            <div class="login__field">
                <i class="login__icon fas fa-key"></i>
                <input type="text" class="login__input" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6">
            </div>
            <span class="error-message" id="otpError">Incorrect OTP</span>
            <button class="login__submit" id="verifyOtpBtn">
                <span class="button__text">Verify</span>
                <i class="button__icon fas fa-check"></i>
            </button>
        </div>
    </div>

    <!-- Error Popup Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content error-content">
            <span class="close-btn" id="closeErrorModal">&times;</span>
            <div class="error-icon-container">
                <i class="fas fa-exclamation-circle error-icon"></i>
            </div>
            <h2 class="error-title">Error</h2>
            <p id="errorMessageText">Something went wrong.</p>
            <button class="login__submit error-btn" id="closeErrorBtn">
                <span class="button__text">Close</span>
            </button>
        </div>
    </div>

    <script src="login.js"></script>

</body>

</html>
