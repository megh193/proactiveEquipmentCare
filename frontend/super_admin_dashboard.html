<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Proactive Equipment Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="default_dashboard.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Proactive Equipment Care</div>
        <div class="nav-links">
            <button class="nav-btn active-nav" onclick="window.location.href='super_admin_dashboard.html'">
                <i class="fa-solid fa-gauge-high"></i> Dashboard
            </button>
            <button class="nav-btn" onclick="goToAnalyse()">
                <i class="fa-solid fa-chart-line"></i> Analyse
            </button>
            <button class="nav-btn" onclick="window.location.href='manage_users.html'">
                <i class="fa-solid fa-users-gear"></i> Manage Users
            </button>
            <div class="profile-dropdown">
                <button class="nav-btn profile-icon-btn">
                    <img src="default_avatar.svg" alt="Profile" class="profile-avatar" id="nav-profile-img">
                </button>
                <div class="dropdown-menu">
                    <button class="dropdown-item" onclick="window.location.href='super_admin_profile.html'">
                        <i class="fa-solid fa-user"></i> Profile
                    </button>
                    <button class="dropdown-item logout-item" onclick="showLogoutPopup()">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="dashboard-content">

        <!-- STEP 1: Upload Section -->
        <div id="upload-section" class="section-card">
            <div class="section-header">
                <i class="fa-solid fa-cloud-arrow-up section-icon"></i>
                <h2>Upload Sensor Data</h2>
                <p>Upload your motor sensor CSV file to begin analysis</p>
            </div>
            <div class="upload-box" id="upload-box">
                <i class="fa-solid fa-cloud-arrow-up upload-icon" id="upload-icon"></i>
                <p id="upload-subtitle">Drag &amp; drop your CSV file here, or click to browse</p>
                <input type="file" id="csv-upload" accept=".csv" class="file-input">
                <label for="csv-upload" class="upload-btn">
                    <i class="fa-solid fa-folder-open"></i> Browse Files
                </label>
            </div>
        </div>

        <!-- STEP 2: Preview Section -->
        <div id="preview-section" class="section-card" style="display:none;">
            <div class="section-header">
                <i class="fa-solid fa-table section-icon"></i>
                <h2>Data Preview</h2>
                <p id="preview-meta">Showing first 10 rows</p>
            </div>

            <div class="table-wrapper">
                <table id="preview-table">
                    <thead id="preview-thead"></thead>
                    <tbody id="preview-tbody"></tbody>
                </table>
            </div>

            <div class="action-bar">
                <button class="action-btn btn-secondary" onclick="resetUpload()">
                    <i class="fa-solid fa-arrow-rotate-left"></i> Change File
                </button>
                <div class="action-bar-right">
                    <button class="action-btn btn-primary" onclick="goToAnalyse()">
                        <i class="fa-solid fa-chart-line"></i> Analyse
                    </button>
                    <button class="action-btn btn-gold" id="convert-btn" onclick="convertAndDownload()">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Download Predictions
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- Logout Popup -->
    <div class="logout-overlay" id="logout-overlay">
        <div class="logout-popup">
            <div class="popup-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
            <h3>Logout Confirmation</h3>
            <p>Are you sure you want to log out of your session?</p>
            <div class="popup-actions">
                <button class="popup-btn btn-no" onclick="hideLogoutPopup()">No, Cancel</button>
                <button class="popup-btn btn-yes" onclick="performLogout()">Yes, Logout</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display:none;">
        <i class="fa-solid fa-circle-info"></i>
        <span id="toast-msg"></span>
    </div>

    <script src="dashboard_core.js"></script>
</body>
</html>
