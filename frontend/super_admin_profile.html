<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Profile - Proactive Equipment Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="dark_mode.css">
</head>
<body>

    <!-- Tall Blue Header Background -->
    <header class="top-header-bg">
        <div class="header-left">
            <div class="logo-icon">
                <i class="fa-solid fa-user-shield" style="color:white; font-size: 1.2rem;"></i>
            </div>
            <div class="header-titles">
                <h1>Proactive Equipment Care</h1>
                <span class="header-badge">Super Admin Settings</span>
            </div>
        </div>
        <div class="header-right">
            <button class="dark-mode-btn">
                <i class="fa-solid fa-moon"></i> Dark Mode
            </button>
            <button class="logout-btn-header" onclick="showLogoutPopup()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </header>

    <!-- Main Content Container with Negative Margin -->
    <main class="dashboard-content">

        <!-- Pill Navigation Bar -->
        <div class="pill-nav" style="margin-top: 2rem;">
            <div class="pill-list">
                <button class="pill-btn" onclick="window.location.href='super_admin_dashboard.html'">Data Upload</button>
                <button class="pill-btn" onclick="window.location.href='manage_users.html'">Manage Users</button>
                <button class="pill-btn active">Profile & Settings</button>
            </div>
        </div>

        <!-- Main Profile Content -->
        <div class="profile-card" style="margin-top: 1rem;">
            <div class="profile-header">
                <h2>Super Admin Profile</h2>
                <div class="divider"></div>
            </div>
            
            <div class="profile-body">
                <div class="profile-image-section">
                    <div class="image-wrapper">
                        <img src="default_avatar.svg" alt="User Profile" class="main-profile-img" id="main-profile-img">
                        <label for="profile-upload" class="upload-overlay">
                            <i class="fa-solid fa-camera"></i>
                            <span>Change Image</span>
                        </label>
                        <input type="file" id="profile-upload" accept="image/*" class="hidden-input">
                    </div>
                </div>

                <div class="profile-details">
                    <div class="detail-item">
                        <div class="detail-text">
                            <span class="detail-label">Full Name</span>
                            <span class="detail-value" id="user-name"></span>
                        </div>
                        <i class="fa-solid fa-user" style="color:var(--text-secondary);font-size:1.5rem;"></i>
                    </div>

                    <div class="detail-item">
                        <div class="detail-text">
                            <span class="detail-label">Assigned Role</span>
                            <span class="detail-value" id="user-role" style="color: var(--primary-blue);">Super Admin</span>
                        </div>
                        <i class="fa-solid fa-shield-halved" style="color:var(--text-secondary);font-size:1.5rem;"></i>
                    </div>
                            <span class="detail-value" id="user-ip">Loading...</span>
                        </div>
                        <i class="fa-solid fa-network-wired" style="color:var(--text-secondary);font-size:1.5rem;"></i>
                    </div>

                    <div class="detail-item">
                        <div class="detail-text">
                            <span class="detail-label">Last Login Time</span>
                            <span class="detail-value" id="last-login">Just now</span>
                        </div>
                        <i class="fa-regular fa-clock" style="color:var(--text-secondary);font-size:1.5rem;"></i>
                    </div>
                </div>
            </div>

            <div class="profile-actions">
                <button class="action-btn home-btn" onclick="window.location.href='super_admin_dashboard.html'">
                    Back to Dashboard
                </button>
                <button class="action-btn" style="background:var(--primary-blue);color:#fff;" onclick="showChangePasswordModal()">
                    Change Password
                </button>
                <button class="action-btn logout-btn" onclick="showLogoutPopup()">
                    Logout Securely
                </button>
            </div>
        </div>
    </main>

    <!-- Change Password Modal -->
    <div class="logout-overlay" id="change-password-overlay">
        <div class="logout-popup">
            <div class="popup-icon"><i class="fa-solid fa-key"></i></div>
            <h3 style="margin-bottom: 0.5rem; font-weight: 800; color: var(--text-primary);">Change Password</h3>
            <div id="cp-step-1">
                <p>We'll send a verification code to your email.</p>
                <div class="popup-actions" style="margin-top: 2rem;">
                    <button class="popup-btn btn-no" onclick="hideChangePasswordModal()">Cancel</button>
                    <button class="popup-btn btn-yes" onclick="requestPasswordOtp()">Send OTP</button>
                </div>
            </div>
            <div id="cp-step-2" style="display:none;">
                <input type="text" id="cp-otp" placeholder="Enter OTP" maxlength="6" style="width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;outline:none;">
                <input type="password" id="cp-new-password" placeholder="New Password" style="width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;outline:none;">
                <input type="password" id="cp-confirm-password" placeholder="Confirm New Password" style="width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--border-color);border-radius:10px;font-size:1rem;outline:none;">
                <p id="cp-error" style="color:var(--danger);font-size:0.85rem;min-height:18px;margin-bottom: 12px; text-align: left;"></p>
                <div class="popup-actions">
                    <button class="popup-btn btn-no" onclick="hideChangePasswordModal()">Cancel</button>
                    <button class="popup-btn btn-yes" style="background:var(--primary-blue);" onclick="submitPasswordChange()">Confirm Update</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Logout Confirmation Popup -->
    <div class="logout-overlay" id="logout-overlay">
        <div class="logout-popup">
            <div class="popup-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
            <h3 style="margin-bottom: 0.5rem; font-weight: 800; color: var(--text-primary);">Logout Confirmation</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Are you sure you want to log out of your session?</p>
            <div class="popup-actions">
                <button class="popup-btn btn-no" onclick="hideLogoutPopup()">Cancel</button>
                <button class="popup-btn btn-yes" onclick="performLogout()">Logout</button>
            </div>
        </div>
    </div>

    <!-- External JS -->
    <script src="profile.js"></script>
    <script>
        function goToAnalyse() { window.location.href = 'analyse.html'; }
    </script>
    <script src="dark_mode.js"></script>
</body>
</html>
