<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Profile — Proactive Equipment Care</title>
    <script>
        if (!localStorage.getItem('user_email') || !localStorage.getItem('auth_token') || localStorage.getItem('role') !== 'super_admin') {
            window.location.replace('login.html');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="profile.css">
    <script src="config.js"></script>
</head>
<body>

<!-- ===== TOP NAVBAR ===== -->
<nav class="app-nav">
    <div class="nav-inner">
        <a class="nav-brand" href="landing.html">
            <div class="nav-logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            </div>
            <div class="nav-brand-text">
                <span class="nav-brand-name">Proactive Equipment Care</span>
                <span class="nav-brand-badge super">Super Admin</span>
            </div>
        </a>
        <div class="nav-tabs">
            <button class="nav-tab" onclick="window.location.href='super_admin_dashboard.html'">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Data Upload
            </button>
            <button class="nav-tab" onclick="window.location.href='manage_users.html'">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                Manage Users
            </button>
            <button class="nav-tab active">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                My Account
            </button>
        </div>
        <div class="nav-actions">
            <button class="nav-logout-btn" onclick="showLogoutPopup()">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </button>
        </div>
    </div>
</nav>

<main class="app-main">
    <div class="profile-card">
        <div class="profile-avatar-section">
            <div class="avatar-wrap">
                <img src="default_avatar.svg" alt="Profile" class="main-profile-img" id="main-profile-img">
                <label for="profile-upload" class="avatar-edit-btn" title="Change photo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                </label>
                <input type="file" id="profile-upload" accept="image/*" class="hidden-input">
            </div>
            <div class="profile-name-role">
                <h2 class="profile-name" id="user-name">Loading...</h2>
                <span class="profile-role-badge super-badge" id="user-role">Super Admin</span>
            </div>
        </div>

        <div class="profile-details-grid">
            <div class="detail-card">
                <div class="detail-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></div>
                <div class="detail-body">
                    <span class="detail-label">Email Address</span>
                    <span class="detail-value" id="user-email">—</span>
                </div>
            </div>
            <div class="detail-card">
                <div class="detail-icon icon-purple"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                <div class="detail-body">
                    <span class="detail-label">Assigned Role</span>
                    <span class="detail-value" id="user-role-display" style="color:var(--accent);">Super Admin</span>
                </div>
            </div>
            <div class="detail-card">
                <div class="detail-icon icon-cyan"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="4" rx="1"/><rect x="1" y="18" width="6" height="4" rx="1"/><rect x="17" y="18" width="6" height="4" rx="1"/><path d="M12 6v4M4 18v-4h16v4M12 10H4v4M12 10h8v4"/></svg></div>
                <div class="detail-body">
                    <span class="detail-label">Last Login IP</span>
                    <span class="detail-value" id="user-ip">Loading...</span>
                </div>
            </div>
            <div class="detail-card">
                <div class="detail-icon icon-amber"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                <div class="detail-body">
                    <span class="detail-label">Last Login</span>
                    <span class="detail-value" id="last-login">—</span>
                </div>
            </div>
        </div>

        <div class="profile-actions">
            <button class="profile-action-btn btn-back" onclick="window.location.href='super_admin_dashboard.html'">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Dashboard
            </button>
            <button class="profile-action-btn btn-change-pwd" onclick="showChangePasswordModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
                Change Password
            </button>
            <button class="profile-action-btn btn-logout" onclick="showLogoutPopup()">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout Securely
            </button>
        </div>
    </div>
</main>

<!-- Change Password Modal -->
<div class="modal-overlay" id="change-password-overlay">
    <div class="modal-box">
        <div class="modal-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
        </div>
        <h3 class="modal-title">Change Password</h3>
        <div id="cp-step-1">
            <p class="modal-desc">We'll send a verification OTP to your registered email address.</p>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="hideChangePasswordModal()">Cancel</button>
                <button class="modal-btn btn-confirm" onclick="requestPasswordOtp()">Send OTP</button>
            </div>
        </div>
        <div id="cp-step-2" style="display:none;">
            <input type="text" id="cp-otp" placeholder="Enter 6-digit OTP" maxlength="6" class="modal-input">
            <input type="password" id="cp-new-password" placeholder="New Password" class="modal-input">
            <input type="password" id="cp-confirm-password" placeholder="Confirm New Password" class="modal-input">
            <p id="cp-error" class="modal-error"></p>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="hideChangePasswordModal()">Cancel</button>
                <button class="modal-btn btn-confirm" onclick="submitPasswordChange()">Update Password</button>
            </div>
        </div>
    </div>
</div>

<!-- Logout Modal -->
<div class="modal-overlay" id="logout-overlay">
    <div class="modal-box">
        <div class="modal-icon-wrap danger-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </div>
        <h3 class="modal-title">Logout Confirmation</h3>
        <p class="modal-desc">Are you sure you want to log out of your session?</p>
        <div class="modal-actions">
            <button class="modal-btn btn-cancel" onclick="hideLogoutPopup()">Cancel</button>
            <button class="modal-btn btn-confirm-danger" onclick="performLogout()">Yes, Logout</button>
        </div>
    </div>
</div>

<script src="super_admin_profile.js?v=2"></script>
<script>function goToAnalyse() { window.location.href = 'analyse.html'; }</script>
</body>
</html>
